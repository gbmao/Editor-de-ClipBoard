name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/EditorDeClipboard/EditorDeClipboard.csproj

      - name: Build
        run: dotnet build src/EditorDeClipboard/EditorDeClipboard.csproj --configuration Release --no-restore

      - name: Publish lightweight app
        run: >
          dotnet publish src/EditorDeClipboard/EditorDeClipboard.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:DebugType=none
          -p:DebugSymbols=false
          --output publish

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Get version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "0.0.0-dev"
          }

          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Build installer
        shell: pwsh
        run: |
          Push-Location installer
          iscc "/DAppVersion=${{ steps.version.outputs.value }}" EditorDeClipboard.iss
          Pop-Location

      - name: Find installer
        id: installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path dist -Filter "*Setup*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Installer not found in dist."
          }

          "path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($installer.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ${{ steps.installer.outputs.path }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "${{ steps.installer.outputs.path }}" `
            --title "${{ github.ref_name }}" `
            --notes "Instalador Windows gerado automaticamente pelo GitHub Actions."
